<!DOCTYPE html>
<html>
<head>
    <title>AI Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🤖 AI Tic Tac Toe</h1>

    <div class="description">
        <h3>Project Description</h3>
        <p>
            This project uses the Minimax Algorithm to create an
            intelligent AI opponent for Tic Tac Toe.
            The AI analyzes all possible moves and always chooses
            the optimal move.
        </p>
    </div>

    <div class="scoreboard">
        <div>👤 Player: <span id="playerScore">0</span></div>
        <div>🤖 AI: <span id="aiScore">0</span></div>
    </div>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <h2 id="status">Your Turn (X)</h2>

    <button onclick="restartGame()">Restart Game</button>

</div>

<audio id="clickSound">
    <source src="click.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
